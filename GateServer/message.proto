syntax = "proto3";
package message;

message CommonResponse {
    int32 error = 1;
    string msg = 2;
    string data = 3;
}

// User service messages
message UserRegisterRequest {
    string username = 1;
    string password = 2;
    string phone = 3;
    string email = 4;
}

message UserLoginRequest {
    string username = 1;
    string password = 2;
}

message UserLoginResponse {
    int32 error = 1;
    string msg = 2;
    int64 uid = 3;
    string token = 4;
    string role = 5;
}

message UserProfileRequest {
    int64 uid = 1;
}

message UserProfileResponse {
    int32 error = 1;
    string msg = 2;
    int64 uid = 3;
    string username = 4;
    string phone = 5;
    string email = 6;
    string id_card = 7;
    string driver_license = 8;
    string real_name = 9;
    int32 gender = 10;
    string birth_date = 11;
    string address = 12;
    string avatar_url = 13;
    string role = 14;
    string status = 15;
}

message UpdateProfileRequest {
    int64 uid = 1;
    string phone = 2;
    string email = 3;
    string id_card = 4;
    string driver_license = 5;
    string real_name = 6;
    int32 gender = 7;
    string birth_date = 8;
    string address = 9;
    string avatar_url = 10;
}

message UserListRequest {
    int32 page = 1;
    int32 page_size = 2;
    string keyword = 3;
    string role = 4;
    string status = 5;
}

message UserListItem {
    int64 uid = 1;
    string username = 2;
    string phone = 3;
    string email = 4;
    string real_name = 5;
    string role = 6;
    string status = 7;
    string created_at = 8;
}

message UserListResponse {
    int32 error = 1;
    string msg = 2;
    repeated UserListItem users = 3;
    int32 total = 4;
}

message UpdateUserStatusRequest {
    int64 uid = 1;
    string status = 2;
}

message UpdateUserRoleRequest {
    int64 uid = 1;
    string role = 2;
}

// Balance messages
message GetBalanceRequest {
    int64 uid = 1;
}

message GetBalanceResponse {
    int32 error = 1;
    double balance = 2;
}

message TopupRequest {
    int64 uid = 1;
    double amount = 2;
    string remark = 3;
}

message BalanceRecordInfo {
    int64 id = 1;
    int64 user_id = 2;
    double amount = 3;
    string type = 4;
    int64 operator_id = 5;
    string remark = 6;
    string created_at = 7;
}

message BalanceRecordListRequest {
    int64 uid = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message BalanceRecordListResponse {
    int32 error = 1;
    repeated BalanceRecordInfo records = 2;
    int32 total = 3;
    double balance = 4;
}

service UserService {
    rpc UserRegister(UserRegisterRequest) returns (CommonResponse);
    rpc UserLogin(UserLoginRequest) returns (UserLoginResponse);
    rpc GetUserProfile(UserProfileRequest) returns (UserProfileResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (CommonResponse);
    rpc GetUserList(UserListRequest) returns (UserListResponse);
    rpc UpdateUserStatus(UpdateUserStatusRequest) returns (CommonResponse);
    rpc UpdateUserRole(UpdateUserRoleRequest) returns (CommonResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
    rpc TopupBalance(TopupRequest) returns (CommonResponse);
    rpc GetBalanceRecords(BalanceRecordListRequest) returns (BalanceRecordListResponse);
}

// ==================== Vehicle Service Messages ====================

message VehicleInfo {
    int64 id = 1;
    string plate_number = 2;
    string brand = 3;
    string model = 4;
    string color = 5;
    int32 year = 6;
    int32 mileage = 7;
    string status = 8;
    double daily_rate = 9;
    double deposit_amount = 10;
    string image_url = 11;
    string description = 12;
    string created_at = 13;
}

message VehicleListRequest {
    int32 page = 1;
    int32 page_size = 2;
    string keyword = 3;
    string status = 4;
    string brand = 5;
}

message VehicleListResponse {
    int32 error = 1;
    string msg = 2;
    repeated VehicleInfo vehicles = 3;
    int32 total = 4;
}

message VehicleDetailRequest {
    int64 id = 1;
}

message AddVehicleRequest {
    string plate_number = 1;
    string brand = 2;
    string model = 3;
    string color = 4;
    int32 year = 5;
    int32 mileage = 6;
    double daily_rate = 7;
    double deposit_amount = 8;
    string image_url = 9;
    string description = 10;
}

message UpdateVehicleRequest {
    int64 id = 1;
    string plate_number = 2;
    string brand = 3;
    string model = 4;
    string color = 5;
    int32 year = 6;
    int32 mileage = 7;
    string status = 8;
    double daily_rate = 9;
    double deposit_amount = 10;
    string image_url = 11;
    string description = 12;
}

message OrderInfo {
    int64 id = 1;
    string order_no = 2;
    int64 user_id = 3;
    string username = 4;
    int64 vehicle_id = 5;
    string plate_number = 6;
    string vehicle_info = 7;
    string start_date = 8;
    string end_date = 9;
    string actual_return_date = 10;
    string status = 11;
    double deposit = 12;
    double daily_rate = 13;
    int32 total_days = 14;
    double total_cost = 15;
    double penalty = 16;
    string notes = 17;
    string created_at = 18;
}

message CreateOrderRequest {
    int64 user_id = 1;
    int64 vehicle_id = 2;
    string start_date = 3;
    string end_date = 4;
    string notes = 5;
}

message OrderListRequest {
    int32 page = 1;
    int32 page_size = 2;
    int64 user_id = 3;
    int64 vehicle_id = 4;
    string status = 5;
    string keyword = 6;
}

message OrderListResponse {
    int32 error = 1;
    string msg = 2;
    repeated OrderInfo orders = 3;
    int32 total = 4;
}

message OrderDetailRequest {
    int64 id = 1;
}

message PickupRequest {
    int64 order_id = 1;
}

message ReturnRequest {
    int64 order_id = 1;
}

message RenewRequest {
    int64 order_id = 1;
    string new_end_date = 2;
}

message MaintenanceInfo {
    int64 id = 1;
    int64 vehicle_id = 2;
    string plate_number = 3;
    string type = 4;
    string description = 5;
    double cost = 6;
    string technician = 7;
    string start_date = 8;
    string end_date = 9;
    string status = 10;
    string created_at = 11;
}

message CreateMaintenanceRequest {
    int64 vehicle_id = 1;
    string type = 2;
    string description = 3;
    double cost = 4;
    string technician = 5;
    string start_date = 6;
}

message UpdateMaintenanceRequest {
    int64 id = 1;
    string description = 2;
    double cost = 3;
    string technician = 4;
    string end_date = 5;
    string status = 6;
}

message MaintenanceListRequest {
    int32 page = 1;
    int32 page_size = 2;
    int64 vehicle_id = 3;
    string status = 4;
    string type = 5;
}

message MaintenanceListResponse {
    int32 error = 1;
    string msg = 2;
    repeated MaintenanceInfo records = 3;
    int32 total = 4;
}

service VehicleService {
    // Vehicle CRUD
    rpc GetVehicleList(VehicleListRequest) returns (VehicleListResponse);
    rpc GetVehicleDetail(VehicleDetailRequest) returns (VehicleInfo);
    rpc AddVehicle(AddVehicleRequest) returns (CommonResponse);
    rpc UpdateVehicle(UpdateVehicleRequest) returns (CommonResponse);
    rpc DeleteVehicle(VehicleDetailRequest) returns (CommonResponse);

    // Rental orders
    rpc CreateOrder(CreateOrderRequest) returns (OrderInfo);
    rpc GetOrderList(OrderListRequest) returns (OrderListResponse);
    rpc GetOrderDetail(OrderDetailRequest) returns (OrderInfo);
    rpc PickupVehicle(PickupRequest) returns (CommonResponse);
    rpc ReturnVehicle(ReturnRequest) returns (OrderInfo);
    rpc RenewOrder(RenewRequest) returns (OrderInfo);
    rpc CancelOrder(PickupRequest) returns (CommonResponse);

    // Maintenance
    rpc CreateMaintenance(CreateMaintenanceRequest) returns (CommonResponse);
    rpc UpdateMaintenance(UpdateMaintenanceRequest) returns (CommonResponse);
    rpc GetMaintenanceList(MaintenanceListRequest) returns (MaintenanceListResponse);
    rpc DeleteMaintenance(VehicleDetailRequest) returns (CommonResponse);
}

// ==================== Finance Service Messages ====================

message PaymentInfo {
    int64 id = 1;
    int64 order_id = 2;
    string order_no = 3;
    double amount = 4;
    string type = 5;
    string method = 6;
    string status = 7;
    string remark = 8;
    string paid_at = 9;
    string created_at = 10;
}

message CreatePaymentRequest {
    int64 order_id = 1;
    double amount = 2;
    string type = 3;
    string method = 4;
    string remark = 5;
}

message PaymentListRequest {
    int32 page = 1;
    int32 page_size = 2;
    int64 order_id = 3;
    string status = 4;
    string type = 5;
}

message PaymentListResponse {
    int32 error = 1;
    string msg = 2;
    repeated PaymentInfo payments = 3;
    int32 total = 4;
}

message InvoiceInfo {
    int64 id = 1;
    string invoice_no = 2;
    int64 order_id = 3;
    string order_no = 4;
    int64 user_id = 5;
    string username = 6;
    double total_amount = 7;
    string items = 8;
    string generated_at = 9;
}

message GenerateInvoiceRequest {
    int64 order_id = 1;
}

message InvoiceListRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message InvoiceListResponse {
    int32 error = 1;
    string msg = 2;
    repeated InvoiceInfo invoices = 3;
    int32 total = 4;
}

message StatsOverviewResponse {
    int32 error = 1;
    string msg = 2;
    int32 total_users = 3;
    int32 total_vehicles = 4;
    int32 available_vehicles = 5;
    int32 active_orders = 6;
    int32 completed_orders = 7;
    double total_revenue = 8;
    double month_revenue = 9;
}

message RevenueStatsRequest {
    string start_date = 1;
    string end_date = 2;
    string granularity = 3;  // daily, weekly, monthly
}

message RevenueStatsItem {
    string date = 1;
    double amount = 2;
    int32 count = 3;
}

message RevenueStatsResponse {
    int32 error = 1;
    string msg = 2;
    repeated RevenueStatsItem items = 3;
    double total = 4;
}

message VehicleStatsResponse {
    int32 error = 1;
    string msg = 2;
    int32 total = 3;
    int32 available = 4;
    int32 rented = 5;
    int32 maintenance = 6;
    double utilization_rate = 7;
    repeated VehicleStatsBrandItem by_brand = 8;
}

message VehicleStatsBrandItem {
    string brand = 1;
    int32 count = 2;
}

service FinanceService {
    rpc CreatePayment(CreatePaymentRequest) returns (PaymentInfo);
    rpc ConfirmPayment(PaymentInfo) returns (PaymentInfo);
    rpc GetPaymentList(PaymentListRequest) returns (PaymentListResponse);
    rpc GetPaymentDetail(PaymentInfo) returns (PaymentInfo);
    rpc GenerateInvoice(GenerateInvoiceRequest) returns (InvoiceInfo);
    rpc GetInvoiceDetail(InvoiceInfo) returns (InvoiceInfo);
    rpc GetInvoiceList(InvoiceListRequest) returns (InvoiceListResponse);
    rpc GetStatsOverview(CommonResponse) returns (StatsOverviewResponse);
    rpc GetRevenueStats(RevenueStatsRequest) returns (RevenueStatsResponse);
    rpc GetVehicleStats(CommonResponse) returns (VehicleStatsResponse);
}

// ==================== Mailer Service Messages ====================

message SendMailRequest {
    string email = 1;
    string code = 2;
}

message SendMailResponse {
    int32 error = 1;
}

message SendVerifyCodeRequest {
    string email = 1;
}

message SendVerifyCodeResponse {
    int32 error = 1;
    string msg = 2;
}

service MailerService {
    rpc SendMail(SendMailRequest) returns (SendMailResponse);
    rpc SendVerifyCode(SendVerifyCodeRequest) returns (SendVerifyCodeResponse);
}
