services:
  # Vue3 Frontend
  vue3-client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gate-server
    networks:
      - rental-net


  # HTTP Gateway
  gate-server:
    build:
      context: .
      dockerfile: ./GateServer/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ums-server:
        condition: service_started
      vehicle-server:
        condition: service_started
      finance-server:
        condition: service_started
      mailer-server:
        condition: service_started
    volumes:
      - ./docker/gate-config.ini:/etc/server/config.ini
      - gate-logs:/var/log/oxypark
    networks:
      - rental-net

  # User Management Service
  ums-server:
    build:
      context: ./UMSServer
      dockerfile: Dockerfile
    ports:
      - "50053:50053"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docker/ums-config.ini:/etc/server/config.ini
      - ums-logs:/var/log/oxypark
    networks:
      - rental-net

  # Vehicle Service
  vehicle-server:
    build:
      context: ./VehicleServer
      dockerfile: Dockerfile
    ports:
      - "50054:50054"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docker/vehicle-config.ini:/etc/server/config.ini
      - vehicle-logs:/var/log/oxypark
    networks:
      - rental-net

  # Finance Service
  finance-server:
    build:
      context: ./FinanceServer
      dockerfile: Dockerfile
    ports:
      - "50055:50055"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docker/finance-config.ini:/etc/server/config.ini
      - finance-logs:/var/log/oxypark
    networks:
      - rental-net

  # Mailer Service
  mailer-server:
    build:
      context: ./MailerServer
      dockerfile: Dockerfile
    ports:
      - "50056:50056"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./docker/mailer-config.json:/app/config.json
    networks:
      - rental-net

  # MySQL Database
  mysql:
    image: docker.cnb.cool/oxythecrack/docker-sync/mysql:latest_amd64
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: vehicle_rental
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rental-net

  # Redis Cache
  redis:
    image: docker.cnb.cool/oxythecrack/docker-sync/redis:latest_amd64
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rental-net

volumes:
  mysql-data:
  redis-data:
  gate-logs:
  ums-logs:
  vehicle-logs:
  finance-logs:

networks:
  rental-net:
    driver: bridge
