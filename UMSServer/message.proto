syntax = "proto3";
package message;

message CommonResponse {
    int32 error = 1;
    string msg = 2;
    string data = 3;
}

// User service messages
message UserRegisterRequest {
    string username = 1;
    string password = 2;
    string phone = 3;
    string email = 4;
}

message UserLoginRequest {
    string username = 1;
    string password = 2;
}

message UserLoginResponse {
    int32 error = 1;
    string msg = 2;
    int64 uid = 3;
    string token = 4;
    string role = 5;
}

message UserProfileRequest {
    int64 uid = 1;
}

message UserProfileResponse {
    int32 error = 1;
    string msg = 2;
    int64 uid = 3;
    string username = 4;
    string phone = 5;
    string email = 6;
    string id_card = 7;
    string driver_license = 8;
    string real_name = 9;
    int32 gender = 10;
    string birth_date = 11;
    string address = 12;
    string avatar_url = 13;
    string role = 14;
    string status = 15;
}

message UpdateProfileRequest {
    int64 uid = 1;
    string phone = 2;
    string email = 3;
    string id_card = 4;
    string driver_license = 5;
    string real_name = 6;
    int32 gender = 7;
    string birth_date = 8;
    string address = 9;
    string avatar_url = 10;
}

message UserListRequest {
    int32 page = 1;
    int32 page_size = 2;
    string keyword = 3;
    string role = 4;
    string status = 5;
}

message UserListItem {
    int64 uid = 1;
    string username = 2;
    string phone = 3;
    string email = 4;
    string real_name = 5;
    string role = 6;
    string status = 7;
    string created_at = 8;
    double balance = 9;
}

message UserListResponse {
    int32 error = 1;
    string msg = 2;
    repeated UserListItem users = 3;
    int32 total = 4;
}

message UpdateUserStatusRequest {
    int64 uid = 1;
    string status = 2;
}

message UpdateUserRoleRequest {
    int64 uid = 1;
    string role = 2;
}

// Balance messages
message GetBalanceRequest {
    int64 uid = 1;
}

message GetBalanceResponse {
    int32 error = 1;
    double balance = 2;
}

message TopupRequest {
    int64 uid = 1;
    double amount = 2;
    string remark = 3;
}

message ConsumeBalanceRequest {
    int64 uid = 1;
    double amount = 2;
    string remark = 3;
}

message BalanceRecordInfo {
    int64 id = 1;
    int64 user_id = 2;
    double amount = 3;
    string type = 4;
    int64 operator_id = 5;
    string remark = 6;
    string created_at = 7;
}

message BalanceRecordListRequest {
    int64 uid = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message BalanceRecordListResponse {
    int32 error = 1;
    string msg = 2;
    repeated BalanceRecordInfo records = 3;
    int32 total = 4;
    double balance = 5;
}

service UserService {
    rpc UserRegister(UserRegisterRequest) returns (CommonResponse);
    rpc UserLogin(UserLoginRequest) returns (UserLoginResponse);
    rpc GetUserProfile(UserProfileRequest) returns (UserProfileResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (CommonResponse);
    rpc GetUserList(UserListRequest) returns (UserListResponse);
    rpc UpdateUserStatus(UpdateUserStatusRequest) returns (CommonResponse);
    rpc UpdateUserRole(UpdateUserRoleRequest) returns (CommonResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
    rpc TopupBalance(TopupRequest) returns (CommonResponse);
    rpc ConsumeBalance(ConsumeBalanceRequest) returns (CommonResponse);
    rpc GetBalanceRecords(BalanceRecordListRequest) returns (BalanceRecordListResponse);
    rpc UpdateBalanceRecordRemark(UpdateBalanceRecordRemarkRequest) returns (CommonResponse);
    rpc ResetPassword(ResetPasswordRequest) returns (CommonResponse);
}

message UpdateBalanceRecordRemarkRequest {
    int64 user_id = 1;
    string old_remark = 2;
    string new_remark = 3;
}

message ResetPasswordRequest {
    string email = 1;
    string new_password = 2;
}
